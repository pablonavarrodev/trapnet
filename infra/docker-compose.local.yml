services:
  collector-api:
    build: ../collector-api
    ports:
      - "8000:8000"

  forwarder:
    build: ../forwarder
    depends_on:
      - collector-api
      - cowrie
    environment:
      COLLECTOR_API_URL: http://collector-api:8000
      COWRIE_LOG_PATH: /cowrie/var/log/cowrie/cowrie.json
      POLL_INTERVAL_SECONDS: 1
    volumes:
      - cowrie-var:/cowrie/var:ro

  cowrie:
    image: cowrie/cowrie:latest
    container_name: trapnet-cowrie
    ports:
      - "2222:2222"
    volumes:
      - cowrie-var:/cowrie/cowrie-git/var
      - cowrie-etc:/cowrie/cowrie-git/etc
    restart: unless-stopped

volumes:
  cowrie-var:
  cowrie-etc: